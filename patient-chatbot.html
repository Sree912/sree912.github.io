  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #e8f4fd 0%, #f0faf5 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat-wrapper {
      width: 100%;
      max-width: 480px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,100,180,.15), 0 4px 20px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 90vh;
      max-height: 780px;
    }

    .chat-header {
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      color: #fff;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .avatar {
      width: 48px; height: 48px;
      background: rgba(255,255,255,.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .header-info { flex: 1; min-width: 0; }
    .header-info h2 {
      font-size: 17px; font-weight: 800;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .header-info p  { font-size: 11px; opacity: .85; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    .chat-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }
    .chat-body::-webkit-scrollbar { width: 4px; }
    .chat-body::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .msg { display: flex; align-items: flex-end; gap: 8px; max-width: 92%; }
    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }

    .bot-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 100%;
      word-break: break-word;
    }
    .msg.bot  .bubble { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 4px; }
    .msg.user .bubble { background: linear-gradient(135deg, #0369a1, #0ea5e9); color: #fff; border-bottom-right-radius: 4px; }

    .typing .bubble { padding: 14px 18px; display: flex; gap: 5px; align-items: center; }
    .dot { width: 7px; height: 7px; background: #94a3b8; border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-6px); } }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px 0 0 36px; }
    .chip {
      background: #fff;
      border: 1.5px solid #0ea5e9;
      color: #0369a1;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .chip:hover { background: #0ea5e9; color: #fff; }

    .chat-footer {
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
      background: #fafafa;
    }
    .chat-footer input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 24px;
      padding: 10px 18px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }
    .chat-footer input:focus { border-color: #0ea5e9; }
    .send-btn {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #0369a1, #0ea5e9);
      border: none; border-radius: 50%; color: #fff; font-size: 18px;

      flex-shrink: 0; transition: transform .15s, opacity .15s;
    }
    .send-btn:hover { transform: scale(1.08); opacity: .9; }

      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 13px 15px;
      font-size: 13px;
      color: #374151;

    .info-card .icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

      display: inline-block;

      border-radius: 10px;
      padding: 2px 9px;
      font-size: 12px;
      font-weight: 500;

      border-radius: 10px;

      font-size: 13px;
      color: #991b1b;
      font-weight: 500;
      line-height: 1.6;

    }

    }
    .btn-phone {
      background: #0369a1; color: #fff;
      box-shadow: 0 2px 8px rgba(3,105,161,.25);
    }

      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 4px;
      font-size: 13px;
    }
    .enquiry-form input,
    .enquiry-form textarea,

      width: 100%;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 8px 11px;
      font-size: 13px;
      font-family: inherit;

    .form-submit-btn {

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
let state = "WELCOME";
let ctx   = {};

/* ═══════════════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════════════ */
const body = document.getElementById("chatBody");
const scrollBottom = () => { body.scrollTop = body.scrollHeight; };

function appendMsg(type, html) {
  const wrapper = document.createElement("div");
  wrapper.className = `msg ${type}`;
  if (type === "bot") {
    const icon = document.createElement("div");
    icon.className = "bot-icon"; icon.textContent = "🤖";
    wrapper.appendChild(icon);
  }
  const bubble = document.createElement("div");
  bubble.className = "bubble"; bubble.innerHTML = html;
  wrapper.appendChild(bubble);
  body.appendChild(wrapper);
  scrollBottom();
}

function appendChips(options) {
  const row = document.createElement("div");
  row.className = "chips";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "chip"; btn.textContent = opt;
    btn.onclick = () => { row.remove(); handleUserInput(opt); };
    row.appendChild(btn);
  });
  body.appendChild(row);
  scrollBottom();
}

function appendCard(html) {
  const msg = document.createElement("div"); msg.className = "msg bot";
  const icon = document.createElement("div"); icon.className = "bot-icon"; icon.textContent = "🤖";
  msg.appendChild(icon);
  const card = document.createElement("div"); card.className = "info-card"; card.innerHTML = html;
  msg.appendChild(card);
  body.appendChild(msg); scrollBottom();
}

function appendEmergency(text) {
  const msg = document.createElement("div"); msg.className = "msg bot";
  const icon = document.createElement("div"); icon.className = "bot-icon"; icon.textContent = "🚨";
  msg.appendChild(icon);
  const banner = document.createElement("div"); banner.className = "emergency-banner"; banner.innerHTML = text;
  msg.appendChild(banner);
  body.appendChild(msg); scrollBottom();
}

function showTyping(cb, delay = 800) {
  const wrapper = document.createElement("div"); wrapper.className = "msg bot typing";
  const icon = document.createElement("div"); icon.className = "bot-icon"; icon.textContent = "🤖";
  wrapper.appendChild(icon);
  const bubble = document.createElement("div"); bubble.className = "bubble";
  bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  wrapper.appendChild(bubble);
  body.appendChild(wrapper); scrollBottom();
  setTimeout(() => { wrapper.remove(); cb(); }, delay);
}

/* ═══════════════════════════════════════════════════════════════
   KEYWORD DETECTION
═══════════════════════════════════════════════════════════════ */
function detect(text, words) {
  const t = text.toLowerCase();
  return words.some(w => t.includes(w));
}

function detectSeverity(text) {
  const t = text.toLowerCase();
  if (KB.triage.emergency.some(w => t.includes(w))) return "emergency";
  if (KB.triage.urgent.some(w => t.includes(w)))    return "urgent";
  if (KB.triage.gpSoon.some(w => t.includes(w)))    return "gp";
  if (KB.triage.selfCare.some(w => t.includes(w)))  return "selfcare";
  return "unknown";
}

/* ═══════════════════════════════════════════════════════════════
   DIALOGUE ENGINE
═══════════════════════════════════════════════════════════════ */
function handleUserInput(raw) {
  const text = raw.trim(); if (!text) return;
  appendMsg("user", escHtml(text));
  showTyping(() => route(text), 600 + Math.random() * 400);
}

function route(text) {
  const t = text.toLowerCase();
  if (detect(t, ["menu", "main menu", "home", "start over", "restart", "back", "help"])) {
    state = "MAIN_MENU"; return showMainMenu();
  }
  if (detect(t, ["bye", "goodbye", "thank you", "thanks", "that's all", "done", "no thanks", "nothing"])) {
    return endConversation();
  }
  switch (state) {
    case "WELCOME":       return stateWelcome(text);
    case "MAIN_MENU":     return stateMainMenu(text);
    case "APPT_MENU":     return stateApptMenu(text);
    case "APPT_TYPE":     return stateApptType(text);
    case "SYMPTOM_DESC":  return stateSymptomDesc(text);
    case "INSURANCE_MENU":return stateInsuranceMenu(text);
    case "SERVICES_MENU": return stateServicesMenu(text);
    case "VACC_MENU":     return stateVaccMenu(text);
    case "ENQUIRY_MENU":  return stateEnquiryMenu(text);
    case "FAQ_MENU":      return stateFaqMenu(text);
    default:              return stateMainMenu(text);

    </div>
  `;

function submitEnquiry(method) {
  const name  = (document.getElementById("eq-name")  || {}).value || "";
  const phone = (document.getElementById("eq-phone") || {}).value || "";
  const type  = (document.getElementById("eq-type")  || {}).value || "";
  const msg   = (document.getElementById("eq-msg")   || {}).value || "";

  if (!name.trim() || !type || !msg.trim()) {
    alert("Please fill in your Name, Enquiry Type, and Message before sending.");
    return;
  }

  const fullMsg =
    `Hello MedCenter,\n\n` +
    `My name is ${name}.\n` +
    (phone ? `Phone: ${phone}\n` : "") +
    `Enquiry Type: ${type}\n\n` +
    `${msg}\n\n` +
    `Thank you,\n${name}`;

  if (method === "whatsapp") {
    const waUrl = KB.contact.waBase + encodeURIComponent(fullMsg);
    window.open(waUrl, "_blank");
    appendMsg("bot", `✅ WhatsApp is opening with your message pre-filled! Just hit <strong>Send</strong> in WhatsApp to reach the MedCenter team.<br><br>
      💬 WhatsApp: <strong>${KB.contact.whatsappFmt}</strong>`);
  } else {
    const subject = encodeURIComponent(`Patient Enquiry – ${type}`);
    const body_   = encodeURIComponent(fullMsg);
    window.location.href = `${KB.contact.mailBase}${subject}&body=${body_}`;
    appendMsg("bot", `✅ Your email client is opening with the message pre-filled! Just hit <strong>Send</strong> to reach us.<br><br>
      ✉️ Email: <strong>${KB.contact.email}</strong>`);
  }

  // Remove the form
  setTimeout(() => {
    const forms = document.querySelectorAll(".enquiry-form");
    forms.forEach(f => f.closest(".msg") && f.closest(".msg").remove());
  }, 300);

  appendMsg("bot", "Is there anything else I can help you with?");
  state = "MAIN_MENU";
  appendChips(["📅 Appointments", "💉 Vaccinations", "🏠 Main Menu"]);
}

    appendMsg("bot", `To book a <strong>vaccination appointment</strong> at MedCenter:<br><br>
      📞 <strong>East Brunswick:</strong> (732) 390-0028<br>
      📞 <strong>Millville:</strong> (732) 390-0028<br><br>
      💡 <em>Most vaccines are covered by Medicare, Medicaid, and major insurance plans. Please bring your insurance card.</em>`);
    state = "MAIN_MENU";
    appendChips(["📍 Clinic Hours", "🏠 Main Menu"]);
    return;

  } else {
    // Show full summary list of all vaccines
    const allVaccines = KB.vaccinations.categories.flatMap(c => c.vaccines.map(v => v.name));
    const tags = allVaccines.map(v => `<span class="tag">${v}</span>`).join("");
    appendMsg("bot", `Here is the <strong>complete list of vaccinations</strong> available at MedCenter:<br><br>${tags}<br><br>
      📞 Call <strong>(732) 390-0028</strong> to confirm availability and book your appointment.`);
    state = "MAIN_MENU";
    appendChips(["📅 Book Vaccine Appointment", "💉 Browse by Category", "🏠 Main Menu"]);
    return;
  }

  appendMsg("bot", "Would you like to explore another vaccine category or book an appointment?");
  state = "VACC_MENU";
  appendChips(["🍂 Flu & COVID", "💉 Routine Vaccines", "🧓 Older Adults (50+)", "✈️ Travel Vaccines", "📅 Book Appointment", "🏠 Main Menu"]);
}

/* ── FAQs ───────────────────────────────────────────────────── */
const FAQ_CHIPS = [
  "📍 Locations & Hours", "👨‍⚕️ About Dr. Babu", "🆕 New Patients",
  "💉 Vaccinations", "💻 Telehealth", "🌐 Languages Spoken",
  "🔁 Repeat Prescriptions", "📊 Test Results", "📋 Referrals",
  "🏥 Hospital Affiliations", "🔬 Lab Services", "📲 Send Enquiry"
];

function showFaqMenu(text) {
  if (text && !detect(text.toLowerCase(), ["faq", "question", "general", "info", "help"])) {
    return handleFaqQuestion(text);
  }
  appendMsg("bot", "Here are some common topics. Which would you like to know about?");
  appendChips(FAQ_CHIPS);
  state = "FAQ_MENU";
}

function stateFaqMenu(text) { handleFaqQuestion(text); }

function handleFaqQuestion(text) {
  const t = text.toLowerCase();
  let answered = false;

  const matchers = [
    { keys: ["location", "address", "where", "hour", "timing", "open", "when"],                q: null, fn: () => showContactCard() },
    { keys: ["about", "who is", "doctor", "dr", "sarath", "physician", "experience"],           q: "doctor" },
    { keys: ["new patient", "accepting", "register", "sign up", "join"],                        q: "new patient" },
    { keys: ["telehealth", "virtual", "online", "video call", "remote"],                        q: "telehealth" },
    { keys: ["language", "spanish", "hindi", "interpret", "translat"],                          q: "language" },
    { keys: ["repeat prescription", "refill", "medication"],                                    q: "repeat prescription" },
    { keys: ["result", "test result", "lab result"],                                            q: "test results" },
    { keys: ["refer", "specialist"],                                                             q: "referral" },
    { keys: ["hospital", "affili", "admitted", "inpatient"],                                    q: "hospital" },
    { keys: ["lab", "onsite", "drug screen", "screening"],                                      q: "drug screening" },
    { keys: ["dot physical", "dot"],                                                             q: "dot physical" },
    { keys: ["sport physical", "sports"],                                                        q: "sports physical" },
    { keys: ["park"],                                                                            q: "parking" },
    { keys: ["service", "treat", "condition", "what do you", "offer"],                          q: "services" },
    { keys: ["vaccin", "immuniz", "shot", "jab", "booster", "flu shot", "shingles",
              "tdap", "hepatitis", "mmr", "hpv", "pneumon", "rsv", "covid vaccine",
              "travel vaccine", "varicella", "meningococcal"],                                   q: null, fn: () => { state = "VACC_MENU"; showVaccMenu(); } },
    { keys: ["enquiry", "enquire", "whatsapp", "email", "contact", "send", "message", "get in touch"],
                                                                                                 q: null, fn: () => { state = "ENQUIRY_MENU"; showEnquiryMenu(); } },
  ];

  for (const m of matchers) {
    if (m.keys.some(k => t.includes(k))) {
      if (m.fn) { m.fn(); answered = true; }
      else {
        const faq = KB.faqs.find(f => f.q === m.q);
        if (faq) { appendMsg("bot", `ℹ️ ${faq.a}`); answered = true; }
      }
      break;
    }
  }

  if (!answered) {
    appendMsg("bot", "I don't have a specific answer for that right now. Please contact us directly:");
    showContactCard();
  }

  appendMsg("bot", "Is there anything else I can help with?");
  state = "MAIN_MENU";
  appendChips(["❓ More FAQs", "📅 Book Appointment", "🏠 Main Menu"]);
}

/* ── END ────────────────────────────────────────────────────── */
function endConversation() {
  const name = ctx.name || "there";
  appendMsg("bot", `You're very welcome, <strong>${name}</strong>! 😊 Take care and stay well. Dr. Babu and the MedCenter team look forward to seeing you. Goodbye! 👋`);
  state = "WELCOME"; ctx = {};
}

/* ═══════════════════════════════════════════════════════════════
   INPUT HANDLING
═══════════════════════════════════════════════════════════════ */
function handleSend() {
  const input = document.getElementById("userInput");
  const text = input.value.trim(); if (!text) return;
  input.value = ""; handleUserInput(text);
}
document.getElementById("userInput").addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });
function escHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

      I can help you with appointments, services, insurance, symptom guidance, and general clinic information.<br><br>
